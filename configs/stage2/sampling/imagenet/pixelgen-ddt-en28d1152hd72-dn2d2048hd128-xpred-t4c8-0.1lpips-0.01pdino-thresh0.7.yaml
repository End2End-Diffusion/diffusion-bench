stage_1:
  target: stage1.pixel.PixelEncoder
  params:
    resolution: 256

stage_2:
  target: stage2.models.DDT.DiTwDDTHead
  ckpt: 'pretrained_models/imagenet/ckpts/pixelgen-ddt-en28d1152hd72-dn2d2048hd128-xpred-t4c8-0.1lpips-0.01pdino-thresh0.7-v0.pt'
  params:
    input_size: 256
    patch_size: [16, 16]
    in_channels: 3
    hidden_size: [1152, 2048]
    depth: [28, 2]
    num_heads: [16, 16]
    mlp_ratio: 4.0

conditioning:
  type: "label"
  cfg_dropout_prob: 0.1
  arch:
      num_t_tokens: 4
      num_c_tokens: 8

transport:
  prediction: 'x'
  time_dist_type: 'logit-normal_-1.1_0.8'
  percep_loss_t_thresh: 0.7

perceptual_loss:
  encoders: 'lpips,dinov2-vit-b'
  percep_loss_weights: [0.1, 0.01]

sampler:
  num_steps: 50

guidance:
  cfg:
    scale: 1.0
    t_min: 0.0
    t_max: 1.0

dataset:
  target: 'imagenet'
  type: 'hf'
  data_dir: "./data/imagenet"
  split: "train"
  condition_type: "label"
  shared_tmpdir: "~/tmp"

training:
  epochs: 80
  global_batch_size: 1024
  grad_accum_steps: 1
  ema_decay: 0.9995
  num_workers: 4
  log_interval: 100
  checkpoint_interval: 10
  sample_every: 25000
  clip_grad: 1.0
  global_seed: 42
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 40
    decay_end_epoch: 800
    base_lr: 2.0e-4
    final_lr: 2.0e-5
    warmup_from_zero: false
  image_size: 256

eval:
  eval_interval: 25000
  eval_model: false
  eval_dir: "results/evals/stage2/sampling/in1k-pixelgen"
  datasets:
    imagenet:
      type: 'hf'
      data_dir: './data/imagenet'
      split: 'val'
      condition_type: 'label'
      reference_npz: './data/imagenet/jit_in256_stats.npz'
      metrics: ['fid', 'inception_score']

misc:
  latent_size: [3, 256, 256]
  num_classes: 1000
  time_dist_shift_dim: 196608
  time_dist_shift_base: 4096
  time_dist_shift_base_eval: 196608
